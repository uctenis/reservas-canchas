<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Oficial - UCTenis</title>
    <style>
        :root { --blue-uct: #004a99; --orange-uct: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        
        /* Header con Logo que vuelve al Home */
        header { background-color: white; padding: 15px 20px; display: flex; align-items: center; border-bottom: 3px solid var(--blue-uct); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-link { display: flex; align-items: center; text-decoration: none; color: var(--blue-uct); font-weight: bold; font-size: 1.2rem; }
        .logo-link img { height: 45px; margin-right: 15px; transition: transform 0.2s; }
        .logo-link img:hover { transform: scale(1.05); }

        .container { max-width: 1000px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--blue-uct); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-style: italic; }
        
        h3 { border-left: 5px solid var(--orange-uct); padding-left: 15px; color: #333; margin-top: 40px; background: #fdfdfd; padding-top: 10px; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: var(--blue-uct); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        tr:hover { background-color: #f0f7ff; }
        
        .pos-badge { background: var(--blue-uct); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; min-width: 30px; display: inline-block; text-align: center; }
        .btn-edit { background: var(--orange-uct); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 6px; font-size: 0.75rem; font-weight: bold; transition: 0.3s; }
        .btn-edit:hover { background: #e68a00; transform: translateY(-1px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .loading-text { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-link">
        <img src="https://uctenis.github.io/reservas-canchas/logo.png" alt="Logo UCTenis" onerror="this.src='https://via.placeholder.com/45?text=UCT'">
        <span>UCTENIS CLUB</span>
    </a>
</header>

<div class="container">
    <h1>Ranking Oficial de Jugadores</h1>
    <p class="subtitle">Sincronizado en tiempo real con la base de datos UCT</p>
    
    <div id="seccion-masculino">
        <h3>Ranking Masculino</h3>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th>Puntos</th>
                    <th>Gestión</th>
                </tr>
            </thead>
            <tbody id="bodyMasculino"><tr class="loading-text"><td colspan="4">Cargando ranking masculino...</td></tr></tbody>
        </table>
    </div>

    <div id="seccion-femenino">
        <h3>Ranking Femenino</h3>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th>Puntos</th>
                    <th>Gestión</th>
                </tr>
            </thead>
            <tbody id="bodyFemenino"><tr class="loading-text"><td colspan="4">Cargando ranking femenino...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
// --- CONFIGURACIÓN DE CONEXIÓN ---
const API_URL = "https://script.google.com/macros/s/AKfycbzrf9Xm7UoP3d4NXxbSNZOFMLaDZk1h49N3EzlZS_xuxYDkzJyDvpmlpwQuQX8kfno/exec";

// TUS URLS DE PUBLICACIÓN CSV
const URL_CSV_MAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXwSh1hxd6vHhWoba0ZilbIJ9a1-UGtJ8GFMEM-FUapDG0qMxNje69JrnbAieAb0aWkmAtM46q8tML/pub?gid=1439775190&single=true&output=csv";
const URL_CSV_FEM = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXwSh1hxd6vHhWoba0ZilbIJ9a1-UGtJ8GFMEM-FUapDG0qMxNje69JrnbAieAb0aWkmAtM46q8tML/pub?gid=246091959&single=true&output=csv";

// --- 1. FUNCIÓN PARA CARGAR DATOS ---
async function cargarDatos(url, tableId, genero) {
    try {
        const res = await fetch(url);
        const csv = await res.text();
        const filas = csv.split('\n').slice(1);
        const tbody = document.getElementById(tableId);
        tbody.innerHTML = "";

        filas.forEach(fila => {
            const col = fila.split(',');
            if (col.length < 2) return;

            const pos = parseInt(col[0]); // Columna A
            const nombre = col[1].trim(); // Columna B
            const puntos = col[2] ? col[2].trim() : "0"; // Columna C

            // REGLA: Solo se muestran si tienen número de posición > 0
            if (!isNaN(pos) && pos > 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="pos-badge">${pos}</span></td>
                    <td><strong>${nombre}</strong></td>
                    <td>${puntos} pts</td>
                    <td>
                        <button class="btn-edit" onclick="accionEditar('${nombre}', ${pos}, '${puntos}', '${genero}')">
                            EDITAR
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    } catch (e) {
        console.error("Error cargando datos:", e);
    }
}

// --- 2. FUNCIÓN PARA EDITAR (BIDIRECCIONAL) ---
async function accionEditar(nombre, pos, pts, genero) {
    const nPos = prompt(`Editar posición de ${nombre}:`, pos);
    if (nPos === null) return;
    
    const nPts = prompt(`Editar puntos de ${nombre}:`, pts);
    if (nPts === null) return;

    const payload = {
        nombre: nombre,
        nuevaPosicion: parseInt(nPos),
        nuevoPuntaje: nPts,
        hoja: (genero === 'M') ? 'rankingmas' : 'rankingfem'
    };

    alert("Sincronizando con Google Sheets... Por favor espera.");

    try {
        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });
        
        alert("¡Éxito! El cambio ha sido enviado a la base de datos. Los cambios pueden tardar unos segundos en aparecer aquí.");
        // Recargar después de un breve delay para que Google actualice el CSV
        setTimeout(() => { location.reload(); }, 2000);
    } catch (err) {
        alert("Error al conectar con el servidor de Google.");
    }
}

// INICIAR CARGA
window.onload = () => {
    cargarDatos(URL_CSV_MAS, 'bodyMasculino', 'M');
    cargarDatos(URL_CSV_FEM, 'bodyFemenino', 'F');
};
</script>

</body>
</html>
