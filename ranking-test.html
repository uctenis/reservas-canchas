<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Test UCTenis</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#001f33;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
}

.tabs {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

button {
  padding:10px 20px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.active {
  background:#c6d300;
  color:#001f33;
}

.card {
  display:flex;
  gap:15px;
  align-items:center;
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

img {
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  background:#333;
}

.info {
  flex:1;
}

.nombre {
  font-weight:bold;
  font-size:18px;
}

.meta {
  font-size:13px;
  opacity:0.8;
}

.puntos {
  font-weight:bold;
  color:#c6d300;
}
</style>
</head>

<body>

<div class="container">
  <h1>Ranking UCTenis TEST</h1>

  <div class="tabs">
    <button id="btnH" class="active">Hombres</button>
    <button id="btnM">Mujeres</button>
  </div>

  <div id="contenido">Cargando...</div>
</div>

<script>

const API = 'https://script.google.com/macros/s/AKfycbz7xwT8QECTamymk3fjq0K0XJZRmewkphc5yoHF_5IePkTM2MGamyefRypSj44XyYxeLg/exec';

let DATA = { hombres: [], mujeres: [] };
let actual = 'hombres';

document.getElementById('btnH').onclick = () => cambiar('hombres');
document.getElementById('btnM').onclick = () => cambiar('mujeres');

function cambiar(tipo){
  actual = tipo;
  document.getElementById('btnH').classList.toggle('active', tipo==='hombres');
  document.getElementById('btnM').classList.toggle('active', tipo==='mujeres');
  render();
}

function render(){
  const cont = document.getElementById('contenido');
  const lista = DATA[actual];

  if(!lista || lista.length===0){
    cont.innerHTML = "No hay datos";
    return;
  }

  cont.innerHTML = '';

  lista.forEach(j => {

    // ⚠️ ruta absoluta para evitar errores
    let foto = j.foto 
      ? "https://uctenis.github.io/reservas-canchas/" + j.foto
      : "https://uctenis.github.io/reservas-canchas/fotos/default_avatar_h.png";

    cont.innerHTML += `
      <div class="card">
        <img src="${foto}" 
             onerror="this.src='https://uctenis.github.io/reservas-canchas/fotos/default_avatar_h.png'">

        <div class="info">
          <div class="nombre">${j.posicion}. ${j.nombre}</div>
          <div class="meta">
            Edad: ${j.edad || '-'} |
            Cat: ${j.categoria || '-'} |
            Mano: ${j.manoHabil || '-'} |
            Revés: ${j.reves || '-'}
          </div>
        </div>

        <div class="puntos">${j.puntos || 0}</div>
      </div>
    `;
  });
}

async function cargar(){
  try{
    const res = await fetch(API + '?t=' + Date.now());
    const json = await res.json();

    console.log("DATA:", json);

    DATA = json;

    render();

  }catch(e){
    console.error(e);
    document.getElementById('contenido').innerHTML = "ERROR cargando datos";
  }
}

cargar();

</script>

</body>
</html>
