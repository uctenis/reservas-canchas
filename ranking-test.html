<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking de Jugadores - UCTenis</title>

  <style>
    :root {
      --background-color: #001f33;
      --text-color: #f5f5f7;
      --subtle-text-color: #a1a1a6;
      --accent-color: #c6d300;
      --card-background: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.10);
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--background-color);
      color: var(--text-color);
    }

    .main-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .header-section {
      text-align: center;
      margin-bottom: 24px;
    }

    .uct-logo{
      width: clamp(96px, 14vw, 168px);
      height: auto;
      display: block;
      margin: 0 auto 12px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.35));
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .ranking-info {
      text-align: center;
      margin-bottom: 24px;
    }

    .last-updated-date {
      font-size: 14px;
      color: var(--subtle-text-color);
      font-style: italic;
      margin: 0;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-color);
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .tab-btn.active {
      background: var(--accent-color);
      color: #001f33;
      border-color: var(--accent-color);
    }

    .loading-ranking,
    .error-message,
    .empty-message {
      text-align: center;
      padding: 18px;
      color: var(--subtle-text-color);
    }

    .ranking-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .player-card {
      display: grid;
      grid-template-columns: 76px 1fr auto;
      gap: 16px;
      align-items: center;
      background: var(--card-background);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 14px;
    }

    .player-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
    }

    .player-main {
      min-width: 0;
    }

    .player-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .player-pos {
      min-width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent-color);
      color: #001f33;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      flex-shrink: 0;
    }

    .player-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }

    .player-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .chip {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text-color);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .player-side {
      text-align: right;
      min-width: 92px;
    }

    .player-points {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent-color);
      line-height: 1;
    }

    .player-points-label {
      font-size: 12px;
      color: var(--subtle-text-color);
      margin-top: 4px;
    }

    .footer-nav {
      text-align: center;
      margin-top: 32px;
    }

    .back-button {
      display: inline-block;
      background-color: var(--accent-color);
      color: #001f33;
      font-size: 16px;
      font-weight: 700;
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      text-decoration: none;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .back-button:hover {
      background-color: #a4b200;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      h1 { font-size: 28px; }

      .player-card {
        grid-template-columns: 62px 1fr;
      }

      .player-avatar {
        width: 62px;
        height: 62px;
      }

      .player-side {
        grid-column: 1 / -1;
        text-align: left;
        padding-left: 78px;
        min-width: auto;
      }

      .player-name {
        font-size: 18px;
      }

      .player-pos {
        min-width: 38px;
        height: 38px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="header-section">
      <img alt="Logo UCTenis Club" class="uct-logo" loading="lazy" src="logo_uctenis_v03.png" />
      <h1>Ranking de Jugadores UCTenis</h1>
    </div>

    <div class="ranking-info">
      <p class="last-updated-date" id="lastUpdatedDate"></p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="btnHombres" type="button">Ranking Masculino</button>
      <button class="tab-btn" id="btnMujeres" type="button">Ranking Femenino</button>
    </div>

    <div id="loadingMessage" class="loading-ranking">Cargando ranking...</div>
    <div id="errorMessage" class="error-message" style="display:none;"></div>
    <div id="emptyMessage" class="empty-message" style="display:none;"></div>
    <div id="rankingContainer" class="ranking-grid" style="display:none;"></div>

    <div class="footer-nav">
      <a class="back-button" href="index.html">Volver a Reservar</a>
    </div>
  </div>

  <script>
    const RANKING_API_URL = 'https://script.google.com/macros/s/AKfycbz7xwT8QECTamymk3fjq0K0XJZRmewkphc5yoHF_5IePkTM2MGamyefRypSj44XyYxeLg/exec';

    let rankingGlobal = { hombres: [], mujeres: [] };
    let vistaActual = 'hombres';

    function actualizarFecha() {
      const lastUpdatedElement = document.getElementById('lastUpdatedDate');
      const hoy = new Date();
      lastUpdatedElement.textContent = `Ranking al día: ${hoy.toLocaleDateString('es-CL', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      })}`;
    }

    function escapeHtml(texto) {
      return String(texto ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderRanking(tipo) {
      vistaActual = tipo;

      const container = document.getElementById('rankingContainer');
      const emptyMessage = document.getElementById('emptyMessage');
      const errorMessage = document.getElementById('errorMessage');
      const loadingMessage = document.getElementById('loadingMessage');

      document.getElementById('btnHombres').classList.toggle('active', tipo === 'hombres');
      document.getElementById('btnMujeres').classList.toggle('active', tipo === 'mujeres');

      loadingMessage.style.display = 'none';
      errorMessage.style.display = 'none';
      emptyMessage.style.display = 'none';

      const players = rankingGlobal[tipo] || [];
      container.innerHTML = '';

      if (!players.length) {
        container.style.display = 'none';
        emptyMessage.textContent = 'No hay jugadores para mostrar en este ranking.';
        emptyMessage.style.display = 'block';
        return;
      }

      players.forEach(player => {
        const foto = player.foto || 'fotos/default_avatar_h.png';
        const posicion = player.posicion ?? '-';
        const nombre = player.nombre ?? '-';
        const edad = player.edad ?? '-';
        const categoria = player.categoria ?? '-';
        const mano = player.manoHabil ?? '-';
        const reves = player.reves ?? '-';
        const puntos = player.puntos ?? 0;

        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
          <img
            class="player-avatar"
            src="${escapeHtml(foto)}"
            alt="Foto de ${escapeHtml(nombre)}"
            loading="lazy"
            onerror="this.onerror=null; this.src='${tipo === 'mujeres' ? 'fotos/default_avatar_m.png' : 'fotos/default_avatar_h.png'}';"
          />

          <div class="player-main">
            <div class="player-name-row">
              <div class="player-pos">${escapeHtml(posicion)}</div>
              <div class="player-name">${escapeHtml(nombre)}</div>
            </div>

            <div class="player-meta">
              <span class="chip">Edad: ${escapeHtml(edad)}</span>
              <span class="chip">Categoría: ${escapeHtml(categoria)}</span>
              <span class="chip">Mano: ${escapeHtml(mano)}</span>
              <span class="chip">Revés: ${escapeHtml(reves)}</span>
            </div>
          </div>

          <div class="player-side">
            <div class="player-points">${escapeHtml(puntos)}</div>
            <div class="player-points-label">puntos</div>
          </div>
        `;
        container.appendChild(card);
      });

      container.style.display = 'grid';
    }

    async function fetchRanking() {
      const loadingMessage = document.getElementById('loadingMessage');
      const errorMessage = document.getElementById('errorMessage');
      const emptyMessage = document.getElementById('emptyMessage');
      const container = document.getElementById('rankingContainer');

      actualizarFecha();

      loadingMessage.style.display = 'block';
      errorMessage.style.display = 'none';
      emptyMessage.style.display = 'none';
      container.style.display = 'none';

      try {
        const response = await fetch(RANKING_API_URL + '?t=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        console.log('JSON ranking:', data);

        rankingGlobal = {
          hombres: Array.isArray(data.hombres) ? data.hombres : [],
          mujeres: Array.isArray(data.mujeres) ? data.mujeres : []
        };

        renderRanking(vistaActual);

      } catch (error) {
        console.error('Error al obtener ranking:', error);
        loadingMessage.style.display = 'none';
        container.style.display = 'none';
        errorMessage.textContent = 'No se pudo cargar el ranking. Revisa el Apps Script, los permisos y el JSON.';
        errorMessage.style.display = 'block';
      }
    }

    document.getElementById('btnHombres').addEventListener('click', () => renderRanking('hombres'));
    document.getElementById('btnMujeres').addEventListener('click', () => renderRanking('mujeres'));
    document.addEventListener('DOMContentLoaded', fetchRanking);
  </script>
</body>
</html>
