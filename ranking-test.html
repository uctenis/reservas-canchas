<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking UCTenis</title>
    <link rel="icon" href="logo_uctenis_v03.png" type="image/png">
    <link rel="stylesheet" href="style.css">

    <style>
        .ranking-toggle-wrapper {
            text-align: center;
            margin: 25px 0 30px;
        }

        .ranking-toggle-btn {
            margin: 0 8px;
            cursor: pointer;
        }

        .ranking-toggle-btn.active {
            background-color: var(--accent-color, #007aff);
            color: #000;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <header>
            <a href="index.html">
                <img src="logo_uctenis_v03.png" alt="Logo UCTenis Club" class="club-logo">
            </a>
            <h1>Ranking UCTenis</h1>
            <div class="date-today" id="lastUpdatedDate">Cargando...</div>
        </header>

        <div class="ranking-toggle-wrapper">
            <button class="btn-pill ranking-toggle-btn active" data-target="femenino">
                Femenino
            </button>
            <button class="btn-pill ranking-toggle-btn" data-target="masculino">
                Masculino
            </button>
        </div>

        <section class="info-section glass-card" id="sectionFemenino">
            <h2 class="section-title">Ranking Femenino</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pos.</th>
                            <th>Jugadora</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyF">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="info-section glass-card" id="sectionMasculino">
            <h2 class="section-title">Ranking Masculino</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pos.</th>
                            <th>Jugador</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyM">
                        </tbody>
                </table>
            </div>
        </section>

        <div style="text-align:center; margin-top:40px;">
            <a href="index.html" class="btn-pill">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                </svg>
                Volver a Reservar
            </a>
        </div>
    </div>

    <div class="modal-overlay" id="playerModal">
        <div class="modal-content"></div>
    </div>

    <script src="script.js"></script>

    <script>
        // CONEXIÓN DIRECTA A TU HOJA DE CÁLCULO (Publicada como CSV)
        const CSV_FEM = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXwSh1hxd6vHhWoba0ZilbIJ9a1-UGtJ8GFMEM-FUapDG0qMxNje69JrnbAieAb0aWkmAtM46q8tML/pub?gid=246091959&single=true&output=csv";
        const CSV_MAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXwSh1hxd6vHhWoba0ZilbIJ9a1-UGtJ8GFMEM-FUapDG0qMxNje69JrnbAieAb0aWkmAtM46q8tML/pub?gid=1439775190&single=true&output=csv";

        async function cargarRanking(url, tbodyId) {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const filas = csv.split(/\r?\n/).slice(1);
                const tbody = document.getElementById(tbodyId);
                tbody.innerHTML = "";

                filas.forEach(fila => {
                    const col = fila.split(/,|;/);
                    if (col.length < 2) return;

                    const pos = col[0].trim();
                    const nombre = col[1].trim();

                    // Regla de conexión: Solo mostrar si hay posición numérica > 0
                    if (pos !== "" && !isNaN(pos) && parseInt(pos) > 0) {
                        const tr = document.createElement('tr');
                        // Mantiene la función openPlayerModal de tu script.js
                        tr.innerHTML = `
                            <td><span class="pos-badge">${pos}</span></td>
                            <td onclick="openPlayerModal('${nombre}')" style="cursor:pointer">${nombre}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                });
            } catch (e) { console.error("Error cargando datos:", e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Ejecutar la carga de ambas pestañas del Excel
            cargarRanking(CSV_FEM, 'tbodyF');
            cargarRanking(CSV_MAS, 'tbodyM');

            // Lógica original de pestañas (Toggle)
            const btns = document.querySelectorAll('.ranking-toggle-btn');
            const sectionFem = document.getElementById('sectionFemenino');
            const sectionMas = document.getElementById('sectionMasculino');

            function showRanking(tipo) {
                if (tipo === 'femenino') {
                    sectionFem.style.display = 'block';
                    sectionMas.style.display = 'none';
                } else {
                    sectionFem.style.display = 'none';
                    sectionMas.style.display = 'block';
                }
            }

            showRanking('femenino');

            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showRanking(btn.getAttribute('data-target'));
                });
            });

            document.getElementById('lastUpdatedDate').innerText = new Date().toLocaleDateString();
        });
    </script>
</body>

</html>
